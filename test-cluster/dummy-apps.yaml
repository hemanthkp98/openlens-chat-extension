---
# Namespace: apps
apiVersion: v1
kind: Namespace
metadata:
  name: apps
---
# Namespace: monitoring
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
# Namespace: staging
apiVersion: v1
kind: Namespace
metadata:
  name: staging

---
# ── apps namespace ──────────────────────────────────────────────────────────

# 1. nginx web server (healthy, 2 replicas)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-web
  namespace: apps
  labels:
    app: nginx-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-web
  template:
    metadata:
      labels:
        app: nginx-web
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-web
  namespace: apps
spec:
  selector:
    app: nginx-web
  ports:
    - port: 80
      targetPort: 80

---
# 2. Redis cache (healthy, single replica)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-cache
  namespace: apps
  labels:
    app: redis-cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-cache
  template:
    metadata:
      labels:
        app: redis-cache
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: redis-cache
  namespace: apps
spec:
  selector:
    app: redis-cache
  ports:
    - port: 6379
      targetPort: 6379

---
# 3. Crashlooping app (bad image — will CrashLoopBackOff)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: broken-api
  namespace: apps
  labels:
    app: broken-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: broken-api
  template:
    metadata:
      labels:
        app: broken-api
    spec:
      containers:
        - name: broken-api
          image: busybox:latest
          command: ["sh", "-c", "echo 'Starting...'; sleep 3; exit 1"]
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"

---
# ── monitoring namespace ─────────────────────────────────────────────────────

# 4. Prometheus (healthy)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.0
          ports:
            - containerPort: 9090
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090

---
# 5. Grafana (healthy)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.1.0
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000

---
# ── staging namespace ────────────────────────────────────────────────────────

# 6. httpbin (healthy, good for testing HTTP)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpbin
  namespace: staging
  labels:
    app: httpbin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: httpbin
  template:
    metadata:
      labels:
        app: httpbin
    spec:
      containers:
        - name: httpbin
          image: kennethreitz/httpbin:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: httpbin
  namespace: staging
spec:
  selector:
    app: httpbin
  ports:
    - port: 80
      targetPort: 80

---
# 7. Pending pod (image that doesn't exist → ImagePullBackOff)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ghost-service
  namespace: staging
  labels:
    app: ghost-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ghost-service
  template:
    metadata:
      labels:
        app: ghost-service
    spec:
      containers:
        - name: ghost-service
          image: mycompany/ghost-service:v99.0.0-does-not-exist
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
